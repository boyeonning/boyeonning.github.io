<svg width="480" height="280" viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <text font-family="sans-serif" font-size="16" font-weight="600" fill="#333" x="240" y="24" text-anchor="middle">Case 1: angle = -10 (보정 불필요)</text>
  
  <!-- horizontal reference line -->
  <line x1="40" y1="210" x2="440" y2="210" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text font-family="sans-serif" font-size="12" fill="#999" x="445" y="214">x축 (수평선)</text>
  
  <!-- rotated document -->
  <g transform="translate(240,140) rotate(-10)">
    <rect x="-100" y="-65" width="200" height="130" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
    <text font-family="sans-serif" font-size="22" font-weight="600" fill="#0C447C" x="0" y="6" text-anchor="middle" dominant-baseline="central">Hello</text>
    <!-- bottom edge highlighted (width edge) -->
    <line x1="-100" y1="65" x2="100" y2="65" stroke="#E24B4A" stroke-width="3"/>
    <text font-family="sans-serif" font-size="11" fill="#E24B4A" x="0" y="82" text-anchor="middle">"width" 변 (긴 변)</text>
  </g>
  
  <!-- angle arc -->
  <path d="M310 210 A70 70 0 0 0 304 182" fill="none" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#ar)"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#A32D2D" x="322" y="200">-10°</text>
  
  <!-- result -->
  <rect x="120" y="244" width="240" height="28" rx="14" fill="#E6F1FB"/>
  <text font-family="sans-serif" font-size="13" font-weight="600" fill="#0C447C" x="240" y="262" text-anchor="middle">-10 > -45 → 그대로 사용 ✓</text>
</svg>

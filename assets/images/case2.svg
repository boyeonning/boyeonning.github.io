<svg width="480" height="280" viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <text font-family="sans-serif" font-size="16" font-weight="600" fill="#333" x="240" y="24" text-anchor="middle">Case 2: angle = -80 (보정 필요!)</text>
  
  <!-- horizontal reference line -->
  <line x1="40" y1="220" x2="440" y2="220" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text font-family="sans-serif" font-size="12" fill="#999" x="445" y="224">x축 (수평선)</text>
  
  <!-- rotated document (nearly vertical) -->
  <g transform="translate(220,130) rotate(-80)">
    <rect x="-100" y="-65" width="200" height="130" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
    <text font-family="sans-serif" font-size="22" font-weight="600" fill="#633806" x="0" y="6" text-anchor="middle" dominant-baseline="central">Hello</text>
    <!-- bottom edge highlighted (width edge) -->
    <line x1="-100" y1="65" x2="100" y2="65" stroke="#E24B4A" stroke-width="3"/>
    <text font-family="sans-serif" font-size="11" fill="#E24B4A" x="0" y="82" text-anchor="middle">"width" 변 (긴 변)</text>
  </g>
  
  <!-- angle arc -->
  <path d="M310 220 A80 80 0 0 0 236 52" fill="none" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#A32D2D" x="318" y="160">-80°</text>
  
  <!-- result -->
  <rect x="90" y="244" width="300" height="28" rx="14" fill="#FCEBEB"/>
  <text font-family="sans-serif" font-size="13" font-weight="600" fill="#791F1F" x="240" y="262" text-anchor="middle">-80 &lt; -45 → 90 + (-80) = 10° 로 보정!</text>
</svg>
